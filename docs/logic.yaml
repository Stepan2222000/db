# ══════════════════════════════════════════════════════════
# Как читать этот документ
#
# YAML описывает логику системы на трёх уровнях:
#
# 1. purpose — общее описание: что система делает, для кого,
#    ключевые принципы. Читай первым.
#
# 2. definitions — справочные карточки технических сущностей.
#    [[id]] в любом тексте = ссылка на definition с таким id.
#    Здесь описано КАК устроены инструменты, файлы, конфиги.
#
# 3. modules → steps → links — граф flow. Модули группируют
#    шаги, стрелки (links) показывают переходы и ветвления.
#    Здесь описано ЧТО происходит в системе.
#
# Для реализации: шаги говорят что делать, definitions —
# как именно (API, форматы, параметры).
# ══════════════════════════════════════════════════════════

purpose: |
  CLI-инструмент `db` для управления PostgreSQL-сервисами внутри одного
  Docker Compose стека. Оператор создаёт, настраивает, бэкапит,
  восстанавливает и удаляет отдельные PostgreSQL-инстансы через команды.

  Единственный источник правды — файлы `.env.<service>`.
  `compose.yaml` генерируется автоматически, руками не редактируется.
  Ошибки — fail fast, без откатов и retry.

  Реализация на Python. Оператор — технический человек.

definitions:
  - id: stack-state
    body_markdown: |
      Состояние системы хранится в нескольких слоях,
      но источник правды — только один:

      - [[service-config]] — по одному файлу на сервис.
        Единственный источник правды. Всё остальное вычисляется из них.
      - [[global-config]] — глобальные настройки стека
        (бэкапы, версия postgres, remote-сервер)
      - `compose.yaml` — генерируется из всех `.env.*` через
        [[compose-generation]]. Руками не редактируется.
      - `data/<service>/` — PostgreSQL datadir, монтируется
        как volume в контейнер
      - `dumps/` — папка для ручных дампов (`db dump`)

      Ограничения:
      - Имя сервиса — только буквы, цифры и подчёркивания
      - Порт — число из диапазона `1024..65535`
      - Автоподбор порта начинается с `5401`,
        проверяя все существующие `.env.*`

  - id: service-config
    body_markdown: |
      Файл `.env.<service>` — конфиг одного сервиса.
      Оператор может редактировать его руками.

      Имя файла = имя сервиса = имя контейнера = имя базы данных.
      Одно имя везде, ничего не дублируется.

      Поля:
      - Пользователь PostgreSQL (по умолчанию `admin`)
      - Пароль PostgreSQL
      - Внешний порт

      Опциональные поля:
      - Максимальное количество подключений (по умолчанию 10000)
      - Отключить автобэкап для этого сервиса (по умолчанию включён)
      - Формат бэкапа: сжатый (`.sql.gz`) или без сжатия (`.sql`),
        по умолчанию из [[global-config]]

  - id: global-config
    body_markdown: |
      Файл `.env` — глобальные настройки стека.
      Никакого реестра сервисов — только общие параметры.

      Группы настроек:
      - Версия образа PostgreSQL (фиксированная)
      - Дефолтный пароль для новых сервисов
      - Настройки автобэкапов (расписание, сжатие, таймаут)
      - Адрес и путь remote-сервера для бэкапов
      - Параметры GFS-ротации (дни, недели, месяцы)
      - Путь к лог-файлу и его максимальный размер

  - id: compose-generation
    body_markdown: |
      `compose.yaml` генерируется из всех `.env.*` файлов.
      Каждый сервис получает одинаковый блок:

      - Образ postgres с версией из [[global-config]]
      - `container_name` = имя сервиса (из имени файла `.env.*`)
      - `env_file` указывает на `.env.<service>`
      - Проброс порта из конфига на внутренний `5432`
      - Том `./data/<service>:/var/lib/postgresql/data`
      - `restart: unless-stopped`
      - Healthcheck через `pg_isready`
      - `command: postgres -c max_connections=<N>`
        если задано в [[service-config]]

      Если compose сломался — перегенерировать и всё чисто.

      Важное поведение Docker Compose:
      `docker compose up -d` автоматически обнаруживает
      изменения в файлах `env_file` и пересоздаёт контейнеры.
      Если ничего не изменилось — контейнеры не трогаются.

  - id: password-sync
    body_markdown: |
      Переменная `POSTGRES_PASSWORD` используется PostgreSQL
      только при первой инициализации (когда `data/` пуст).
      После этого пароль живёт внутри базы и env-переменная
      на него не влияет.

      Поэтому при смене пароля в `.env` необходимо явно
      обновить роль внутри PostgreSQL:
      ```
      docker exec <container> psql -U <user> \
        -c "ALTER ROLE <user> PASSWORD '<password>'"
      ```

      Почему это безопасно: `docker exec` запускает `psql`
      внутри контейнера через unix-сокет. PostgreSQL
      доверяет локальным подключениям (`trust` в `pg_hba.conf`),
      пароль для подключения не нужен.

      Идемпотентно: `ALTER ROLE` с тем же паролем ничего не ломает.

  - id: backup-policy
    body_markdown: |
      Два режима бэкапа:

      - **Автоматический** (`db backup`) — дамп уходит на remote
        через `rsync`, локальная копия удаляется сразу
      - **Ручной** (`db dump`) — дамп остаётся локально
        у оператора

      GFS-ротация на remote (дефолты из [[global-config]]):
      - Все бэкапы за последние 7 дней
      - Воскресные бэкапы за последние 4 недели
      - Бэкапы 1-го числа за последние 3 месяца
      - Остальное удаляется (~14 файлов на сервис)

      Ротация выполняется нашим скриптом по SSH
      после каждой успешной отправки.

      Структура на remote:
      ```
      <remote_path>/<hostname>/<service>/
        <service>_YYYY-MM-DD_HH-MM.sql.gz
      ```
      `<hostname>` определяется автоматически — несколько
      серверов могут слать бэкапы на один remote.

      Формат файла: `.sql.gz` (сжатый) или `.sql` (без сжатия)
      — по настройке сжатия.

  - id: autobackup-cron
    body_markdown: |
      Команда `db autobackup` управляет cron-расписанием
      для автоматических бэкапов:

      - `install` — создать cron-задачу с расписанием
        из [[global-config]], запускает `db backup`
      - `uninstall` — удалить cron-задачу
      - `status` — показать настройки, наличие cron,
        настройки бэкапов из [[service-config]] по каждому сервису
      - `test` — запустить `db backup` вручную прямо сейчас
      - `logs` — показать хвост лог-файла

  - id: "db status"
    body_markdown: |
      Команда `db status` показывает список всех сервисов.

      Для каждого сервиса выводится:
      - Имя сервиса
      - Размер базы данных

      Размер берётся из PostgreSQL (`pg_database_size`)
      для запущенных сервисов, с диска (`du`) для остановленных.

modules:
  - id: service-provisioning
    purpose: Создать новый PostgreSQL-сервис и запустить его.
    steps:
      - id: validate-request
        body_markdown: |
          Оператор вызывает `db add <name>` с необязательными
          `--port` и `--password`.

          Система проверяет:
          - Формат имени сервиса (буквы, цифры, подчёркивания)
          - Что `.env.<name>` ещё не существует
          - Порт: если указан — диапазон и что не занят;
            если не указан — автоподбор свободного начиная с 5401

          Правила проверки опираются на [[stack-state]].
        links:
          - to: create-service-config
            condition: "запрос валиден"

      - id: create-service-config
        body_markdown: |
          Создать [[service-config]] с параметрами:
          - Пользователь `admin`
          - Пароль из аргумента или дефолт из [[global-config]]
          - Выбранный порт

          Создать каталог `data/<service>/`.

          Перегенерировать `compose.yaml` через [[compose-generation]].
        links:
          - to: confirm-and-launch
            condition: "конфигурация сохранена"

      - id: confirm-and-launch
        body_markdown: |
          Показать оператору итоговые параметры:
          имя, порт, пароль, версия postgres.
          Спросить подтверждение.

          После подтверждения:
          - `docker compose up <service> -d`
          - Дождаться готовности через `pg_isready`
          - Вывести параметры подключения

          Если запуск не удался — сообщить ошибку и остановиться.
          Уже записанные файлы не откатываются.
        links:
          - to: edit-config
            condition: "оператор позже меняет настройки сервиса"
          - to: check-remote-access
            condition: "сервис попадает в цикл бэкапов"
          - to: inspect-before-removal
            condition: "сервис выводят из эксплуатации"

  - id: service-reconfiguration
    purpose: Применить ручные изменения конфигурации и синхронизировать всё состояние.
    steps:
      - id: edit-config
        body_markdown: |
          Оператор руками редактирует [[service-config]] —
          меняет пароль, порт или другие параметры.

          Затем вызывает `db apply`.
        links:
          - to: rebuild-and-diff
            condition: "оператор запустил apply"

      - id: rebuild-and-diff
        body_markdown: |
          Перегенерировать `compose.yaml` через [[compose-generation]]
          из всех `.env.*` файлов.

          Проверить конфликты портов между сервисами.
          Если конфликт — сообщить и остановиться.

          Показать оператору что изменилось (diff).
          Спросить подтверждение.
        links:
          - to: apply-changes
            condition: "оператор подтвердил"

      - id: apply-changes
        body_markdown: |
          `docker compose up -d` — Docker Compose сам определяет,
          какие контейнеры нужно пересоздать.

          Для каждого запущенного контейнера — выполнить
          [[password-sync]] с паролем из `.env`.
          Это идемпотентно: если пароль не менялся,
          ничего не сломается.

          Можно запускать `db apply` многократно.
        links:
          - to: check-remote-access
            condition: "сервис возвращается в обычный цикл бэкапов"

  - id: remote-backup
    purpose: Снять дамп и отправить на remote-сервер с ротацией.
    steps:
      - id: check-remote-access
        body_markdown: |
          Оператор вызывает `db backup [name]`.

          Поставить lock (один процесс бэкапа одновременно).

          Проверить:
          - Remote-сервер доступен по SSH (через `paramiko`)
          - Достаточно свободного места на локальном диске

          Если SSH недоступен или мало места — стоп,
          ошибка в лог.
        links:
          - to: dump-and-send
            condition: "remote доступен, место есть"

      - id: dump-and-send
        body_markdown: |
          Для каждого сервиса-кандидата (все `.env.*` или один
          конкретный по аргументу):

          - Пропустить если бэкапы отключены в [[service-config]]
          - Найти запущенный контейнер
          - Выполнить `pg_dump` внутри контейнера (с таймаутом)
          - Сжать или оставить без сжатия — по [[backup-policy]]
          - Отправить на remote через `rsync`
          - Удалить локальный файл сразу после успешной отправки

          Если `rsync` упал — стоп, ошибка в лог,
          не продолжать со следующими сервисами.
        links:
          - to: rotate-remote
            condition: "файл отправлен успешно"

      - id: rotate-remote
        body_markdown: |
          GFS-ротация на remote через SSH по правилам
          из [[backup-policy]].

          Если SSH для ротации упал — не критично,
          файлы накопятся, почистятся при следующем прогоне.

          Вывести статистику: сколько сервисов, успехов, ошибок.
          Всё логируется в файл и терминал.
        links:
          - to: select-restore-source
            condition: "оператор позже восстанавливает из бэкапа"

  - id: local-dump
    purpose: Сохранить дамп базы локально для оператора.
    steps:
      - id: dump-locally
        body_markdown: |
          Оператор вызывает `db dump <name>`.

          - Найти запущенный контейнер для сервиса
          - Выполнить `pg_dump` внутри контейнера
          - Сжать или оставить без сжатия — по [[backup-policy]]
          - Сохранить в папку `dumps/` внутри проекта
          - Сообщить путь к файлу и его размер
        links:
          - to: select-restore-source
            condition: "оператор позже восстанавливает из локального файла"

  - id: data-restoration
    purpose: Заменить данные сервиса содержимым из бэкапа.
    steps:
      - id: select-restore-source
        body_markdown: |
          Оператор вызывает `db restore <name>`.

          Без указания файла — интерактивный выбор:
          - Показать локальные файлы (от ручных dump), если есть
          - Получить список файлов на remote по SSH
            (через `paramiko`), с датами и размерами
          - Показать объединённый нумерованный список
          - Оператор выбирает номер
          - Если выбран remote-файл — скачать во временную папку

          С аргументом `path` — использовать указанный файл.
        links:
          - to: confirm-restore
            condition: "файл для восстановления определён"

      - id: confirm-restore
        body_markdown: |
          Показать предупреждение: имя сервиса,
          текущий размер БД, выбранный файл бэкапа.

          Это разрушительная операция — текущие данные
          будут полностью заменены.

          Спросить подтверждение. Флаг `--force` пропускает вопрос.
        links:
          - to: replace-database
            condition: "оператор подтвердил"

      - id: replace-database
        body_markdown: |
          - Проверить что контейнер сервиса запущен
          - Завершить активные подключения к базе
          - Удалить базу и создать заново (`DROP` + `CREATE`)
          - Загрузить дамп через `psql`
            (`.sql.gz` распаковать через gzip, `.sql` напрямую)
          - Удалить временный файл (если скачивался с remote)
        links:
          - to: check-remote-access
            condition: "сервис снова входит в обычный цикл бэкапов"

  - id: service-decommissioning
    purpose: Безвозвратно удалить сервис, контейнер и данные.
    steps:
      - id: inspect-before-removal
        body_markdown: |
          Оператор вызывает `db remove <name>`.

          Проверить что [[service-config]] существует.
          Если нет — показать список известных сервисов и выйти.

          Показать что будет удалено:
          - Конфигурационный файл `.env.<service>`
          - Контейнер и его текущий статус
          - Каталог данных `data/<service>/` и его размер
        links:
          - to: collect-confirmations
            condition: "сервис найден"

      - id: collect-confirmations
        body_markdown: |
          Запросить несколько подтверждений:
          - Согласие на удаление (y/n)
          - Повторный ввод точного имени сервиса
          - Ввод слова `DELETE` для подтверждения удаления данных

          Флаг `--force` пропускает все подтверждения.
        links:
          - to: remove-service
            condition: "все подтверждения получены"

      - id: remove-service
        body_markdown: |
          По шагам удалить все артефакты:
          - Остановить и удалить контейнер (если существует)
          - Удалить `.env.<service>`
          - Удалить `data/<service>/`
          - Перегенерировать `compose.yaml`
            через [[compose-generation]]

          Бэкапы на remote не трогаем — они могут быть
          единственной копией данных.

          Если каких-то артефактов уже нет —
          соответствующий шаг пропускается.
        links:
          - to: validate-request
            condition: "оператор позже создаёт новый сервис"
