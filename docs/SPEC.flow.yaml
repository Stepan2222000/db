# Как читать этот файл:
# - `purpose` описывает общий смысл системы и правила работы.
# - `definitions` собирают повторно используемые сущности, на которые ссылаются шаги через `[[id]]`.
# - `modules` образуют пользовательский flow; первый шаг каждого модуля является его точкой входа.

purpose: |
  `db` — CLI для оператора, который держит несколько PostgreSQL-сервисов внутри одного Docker Compose стека.

  Пользовательский маршрут строится вокруг повторяющихся действий:
  - завести новый сервис или вручную поправить его конфиг
  - синхронизировать стек с `.env` файлами
  - проверить объём данных
  - сделать remote-бэкап или локальный дамп
  - восстановить сервис из сохранённой копии
  - включить или проверить cron-задачи для автобэкапов и метрик
  - удалить сервис, если он больше не нужен

  Ключевые правила системы:
  - единственный источник правды по сервисам — `.env.<service>`
  - имя сервиса совпадает с именем файла, контейнера и базы
  - `compose.yaml` всегда генерируется заново, а не редактируется руками
  - любая ошибка останавливает команду сразу, без rollback и без retry

definitions:
  - id: global-env
    body_markdown: |
      Глобальный `.env` хранит общие настройки стека:
      - версию PostgreSQL образа, по спецификации фиксированную на `18`
      - пароль по умолчанию для новых сервисов
      - расписание автобэкапов, флаг включения, формат, таймаут
      - SSH-доступ к remote-серверу: IP, логин, пароль
      - корневой путь для remote-бэкапов
      - ротация бэкапов: максимум дней хранения и максимум файлов на сервис
      - путь к лог-файлу бэкапов и его максимальный размер
      - флаг включения метрик и интервал сбора, по умолчанию 5 минут

      Этот файл не хранит список сервисов. Реестр сервисов существует только через [[service-env-file]].

      [Синтаксис .env файлов](https://docs.docker.com/compose/env-file/)

  - id: service-env-file
    body_markdown: |
      Каждый сервис описан отдельным файлом `.env.<service>`.

      Обязательные поля:
      - пользователь PostgreSQL
      - пароль PostgreSQL
      - внешний порт

      Опциональные поля:
      - `max_connections`, по умолчанию `10000`
      - отключение автобэкапа для конкретного сервиса
      - формат бэкапа: `.sql.gz` или `.sql`
      - лимиты памяти и CPU контейнера

      Имя файла совпадает с именем сервиса, контейнера и базы. Оператор может создавать и редактировать эти файлы вручную.

      [Поведение POSTGRES_PASSWORD при инициализации](https://hub.docker.com/_/postgres)
      [max_connections](https://www.postgresql.org/docs/current/runtime-config-connection.html)
      [deploy.resources.limits](https://docs.docker.com/reference/compose-file/deploy/#resources)

  - id: generated-compose
    body_markdown: |
      `compose.yaml` — полностью генерируемый артефакт из всех [[service-env-file]].

      Для каждого сервиса в него попадают:
      - образ `postgres:18`
      - `container_name`, совпадающий с именем сервиса
      - `env_file`, указывающий на `.env.<service>`
      - проброс внешнего порта на `5432`
      - volume `./data/<service>:/var/lib/postgresql/data` (проверить актуальный `PGDATA` для PostgreSQL 18)
      - `restart: unless-stopped`
      - healthcheck на `pg_isready`
      - `shm_size`, пересчитанный как `RAM * 0.9 / количество_сервисов`
      - `command: postgres -c max_connections=<N>`, если лимит подключений задан
      - `deploy.resources.limits`, если для сервиса заданы CPU или memory лимиты

      Важно: в PostgreSQL 18 `PGDATA` изменился на `/var/lib/postgresql/18/docker`.
      Volume mount должен указывать на этот путь.

      Первая строка файла должна быть служебным предупреждением о том, что файл нельзя редактировать руками и нужно использовать `db apply`.

      [Compose services reference](https://docs.docker.com/reference/compose-file/services/) — `command`, `container_name`, `env_file`, `healthcheck`, `restart`, `shm_size`
      [shm_size](https://docs.docker.com/reference/compose-file/services/#shm_size)
      [healthcheck](https://docs.docker.com/reference/compose-file/services/#healthcheck)

  - id: service-data-dir
    body_markdown: |
      `data/<service>/` — каталог данных PostgreSQL для конкретного сервиса.

      Он:
      - монтируется в контейнер как datadir
      - создаётся при `db add`
      - также создаётся при `db apply`, если конфиг есть, а каталога ещё нет

      [PostgreSQL Docker image — initialization](https://github.com/docker-library/docs/blob/master/postgres/content.md)

  - id: local-dumps
    body_markdown: |
      `dumps/` хранит локальные файлы ручных дампов из `db dump`.

      Особенности:
      - файлы остаются только на локальной машине
      - формат имени: `<service>_YYYY-MM-DD_HH-MM.sql.gz` или `.sql`
      - автоматической ротации нет

  - id: remote-backup-storage
    body_markdown: |
      Remote-хранилище используется автоматическими и ручными запусками `db backup`.

      Структура:
      ```text
      <remote_path>/
        <hostname>/
          <service>/
            <service>_YYYY-MM-DD_HH-MM.sql.gz
      ```

      Правила передачи:
      - файл сначала пишется как `.tmp`, потом переименовывается в финальное имя
      - старые `.tmp` очищаются при следующем прогоне
      - ротация работает только по финальным `.sql.gz` или `.sql` файлам

  - id: backup-rotation
    body_markdown: |
      Ротация удаляет устаревшие бэкапы на remote после каждой успешной отправки.

      Оператор задаёт в [[global-env]] два параметра:
      - максимум дней хранения (например, 60)
      - максимум файлов на сервис (например, 14)

      Алгоритм:
      - всё старше максимума дней — удаляется безусловно
      - из оставшихся файлов оставить не больше N штук,
        равномерно распределённых по времени
      - самый свежий и самый старый — всегда сохраняются
      - остальные выбираются так, чтобы интервалы между ними
        были примерно одинаковые

      Ротация выполняется через SFTP (`listdir` + `remove`).
      Ошибка ротации некритична: лишние файлы останутся на remote и будут очищены при следующем прогоне.

      [SFTPClient.listdir_attr](https://docs.paramiko.org/en/stable/api/sftp.html)

  - id: runtime-tooling
    body_markdown: |
      Основные внешние механизмы, через которые проходит рабочий flow:

      - `docker compose` — поднимает и пересоздаёт контейнеры.
        [CLI reference](https://docs.docker.com/reference/cli/docker/compose/)
      - `docker exec` — запускает `pg_dump` и `psql` внутри контейнера.
        [pg_dump](https://www.postgresql.org/docs/current/app-pgdump.html),
        [psql](https://www.postgresql.org/docs/current/app-psql.html),
        [pg_isready](https://www.postgresql.org/docs/current/app-pg-isready.html)
      - `paramiko` — SSH/SFTP-соединение к remote-серверу по паролю.
        [SSHClient](https://docs.paramiko.org/en/stable/api/client.html),
        [SFTPClient](https://docs.paramiko.org/en/stable/api/sftp.html)
      - `crontab` — периодические задачи.
        [python-crontab](https://pypi.org/project/python-crontab/)

  - id: apply-password-sync
    body_markdown: |
      После `db apply` пароль нужно синхронизировать не только в [[service-env-file]], но и внутри уже инициализированной базы.

      Для этого команда:
      - выполняет `ALTER ROLE` для пользователя сервиса
      - запускает `psql` внутри контейнера через `docker exec`
      - берёт пароль из актуального [[service-env-file]]

      Почему это нужно:
      - `POSTGRES_PASSWORD` влияет только на первую инициализацию пустого `data/`
      - после инициализации пароль живёт внутри PostgreSQL и не меняется от одного обновления env-файла

      Почему это безопасно:
      - подключение идёт внутри контейнера через unix-сокет
      - локальное подключение доверено PostgreSQL
      - повторный `ALTER ROLE` с тем же паролем остаётся идемпотентным

      [ALTER ROLE](https://www.postgresql.org/docs/current/sql-alterrole.html)
      [pg_hba.conf — trust auth](https://www.postgresql.org/docs/current/auth-pg-hba-conf.html)
      [Entrypoint script — логика инициализации](https://github.com/docker-library/postgres/blob/master/docker-entrypoint.sh)

  - id: metrics-db
    body_markdown: |
      `metrics.db` — SQLite база с метриками контейнеров.

      В неё попадают:
      - CPU %
      - использование памяти
      - сетевой I/O
      - дисковый I/O

      Источник данных — `docker stats --no-stream`. Отдельной команды для просмотра нет: оператор открывает SQLite сам.

      [docker stats](https://docs.docker.com/reference/cli/docker/container/stats/) — `--no-stream`, `--format`, JSON output
      [Python sqlite3](https://docs.python.org/3/library/sqlite3.html)

modules:
  - id: operator-entry
    purpose: Начать работу с проектом и перейти в нужный пользовательский сценарий.
    input: Оператор находится в каталоге проекта и понимает текущую задачу по стеку.
    output: Выбран следующий сценарий работы.
    steps:
      - id: entry-assess-stack-state
        body_markdown: |
          Оператор работает с проектом, где:
          - [[global-env]] задаёт общие правила стека
          - [[service-env-file]] остаются единственным источником правды по сервисам
          - [[generated-compose]] каждый раз пересобирается из конфигов, а не редактируется руками
          - операции выполняются через [[runtime-tooling]] и должны запускаться из каталога проекта

          Отсюда пользователь выбирает следующее действие:
          - завести новый сервис
          - применить ручные изменения конфигов
          - посмотреть размеры
          - сделать remote-бэкап
          - сделать локальный дамп
          - восстановить данные
          - настроить cron и метрики
          - удалить сервис
        links:
          - to: create-validate-request
            condition: нужен новый сервис
          - to: sync-prepare-state
            condition: конфиги уже изменены и их нужно применить
          - to: sizes-collect
            condition: нужно понять текущие размеры баз
          - to: backup-acquire-lock
            condition: нужен remote-бэкап
          - to: dump-find-container
            condition: нужен локальный дамп
          - to: restore-choose-backup
            condition: нужно восстановить данные
          - to: autobackup-choose-action
            condition: нужно управлять cron-задачами и метриками
          - to: remove-check-service
            condition: сервис больше не нужен

  - id: create-service
    purpose: Создать новый PostgreSQL-сервис и довести его до рабочего состояния.
    input: Имя сервиса и, при необходимости, явно заданные порт или пароль.
    output: Новый сервис описан в конфиге, поднят в Docker Compose и готов принимать подключения.
    steps:
      - id: create-validate-request
        body_markdown: |
          Команда `db add <name> [--port X] [--password Y]` сначала проверяет запрос:
          - имя сервиса должно состоять только из букв, цифр и подчёркиваний
          - если порт не передан, нужно подобрать свободный, начиная с `5401`, просматривая все [[service-env-file]]
          - если порт передан, нужно проверить диапазон `1024..65535` и отсутствие конфликта с другими сервисами
          - файл `.env.<name>` не должен уже существовать
        links:
          - to: create-materialize-service
            condition: имя и порт валидны, а конфиг ещё не существует

      - id: create-materialize-service
        body_markdown: |
          После успешной проверки команда материализует новый сервис:
          - создаёт [[service-env-file]] для сервиса
          - записывает пользователя `admin`
          - берёт пароль из аргумента или из [[global-env]]
          - сохраняет выбранный внешний порт
          - создаёт [[service-data-dir]]
          - перегенерирует [[generated-compose]]
        links:
          - to: create-confirm-and-start
            condition: конфиг, каталог данных и compose уже подготовлены

      - id: create-confirm-and-start
        body_markdown: |
          Перед запуском оператор видит итоговые параметры:
          - имя сервиса
          - внешний порт
          - пароль
          - версию PostgreSQL

          После подтверждения команда:
          - выполняет `docker compose up <service> -d`
          - ждёт готовность через `pg_isready`, максимум 60 секунд
          - выводит параметры подключения

          Если любой шаг падает, команда останавливается без отката уже выполненных действий.
        links:
          - to: backup-acquire-lock
            condition: сервис поднят и его нужно сразу защитить remote-бэкапом
          - to: sync-prepare-state
            condition: конфиг позже меняют вручную и стек нужно снова синхронизировать
          - to: sizes-collect
            condition: нужно проверить фактический размер новой базы
          - to: autobackup-choose-action
            condition: нужно включить регулярные бэкапы и метрики

  - id: sync-stack
    purpose: Привести Docker Compose стек в соответствие с текущими `.env.<service>` файлами.
    input: Уже существующие или вручную отредактированные конфиги сервисов.
    output: Актуальный `compose.yaml`, корректные каталоги данных и синхронизированные пароли внутри баз.
    steps:
      - id: sync-prepare-state
        body_markdown: |
          Команда `db apply` начинает с подготовки файлового и compose-состояния:
          - создаёт [[service-data-dir]] для каждого [[service-env-file]], у которого каталога ещё нет
          - заново собирает [[generated-compose]] из всех сервисных конфигов
          - пересчитывает `shm_size` из [`/proc/meminfo`](https://man7.org/linux/man-pages/man5/proc_meminfo.5.html) по формуле `RAM * 0.9 / количество_сервисов`
        links:
          - to: sync-check-conflicts
            condition: новый compose собран и готов к проверке

      - id: sync-check-conflicts
        body_markdown: |
          Перед изменением runtime команда:
          - проверяет конфликты портов между сервисами
          - строит diff между текущим и новым состоянием
          - показывает diff оператору и запрашивает подтверждение

          Любой конфликт или другая ошибка останавливает процесс сразу.
        links:
          - to: sync-reconcile-runtime
            condition: конфликтов нет и оператор подтвердил изменения

      - id: sync-reconcile-runtime
        body_markdown: |
          После подтверждения команда синхронизирует живой стек:
          - запускает `docker compose up -d`
          - полагается на поведение Compose, который сам определяет, какие контейнеры нужно пересоздать
          - для каждого запущенного контейнера выполняет [[apply-password-sync]]
        links:
          - to: sizes-collect
            condition: нужно проверить состояние после синхронизации
          - to: backup-acquire-lock
            condition: после изменений нужен remote-бэкап
          - to: autobackup-choose-action
            condition: после синхронизации нужно проверить cron и сбор метрик
          - to: entry-assess-stack-state
            condition: стек приведён в нужное состояние и оператор выбирает следующий шаг

  - id: inspect-sizes
    purpose: Показать текущий объём данных по каждому сервису перед следующими действиями.
    output: Отчёт с размерами баз по всем сервисам.
    steps:
      - id: sizes-collect
        body_markdown: |
          Команда `db sizes` собирает размер каждой базы:
          - для запущенных сервисов показывает размер через `pg_database_size()`
          - для остановленных сервисов предлагает запустить
          - если сервисов нет, сообщает об этом явно

          Результат приводится к формату «имя сервиса + размер в ГБ».
        links:
          - to: sizes-present
            condition: размеры собраны

      - id: sizes-present
        body_markdown: |
          Этот отчёт нужен как точка принятия решения:
          - понять объём перед локальным дампом
          - оценить объём перед remote-бэкапом
          - увидеть текущий размер перед восстановлением
          - понять, какой сервис занимает место перед удалением
        links:
          - to: dump-find-container
            condition: нужен локальный дамп выбранного сервиса
          - to: backup-acquire-lock
            condition: нужен remote-бэкап после оценки объёма
          - to: restore-choose-backup
            condition: текущие данные нужно заменить из бэкапа
          - to: remove-check-service
            condition: сервис признан лишним и его нужно удалить
          - to: entry-assess-stack-state
            condition: нужно выбрать другое действие без изменения данных

  - id: backup-remote
    purpose: Отправить бэкап на remote-сервер напрямую потоком и выполнить ротацию.
    input: Все сервисы или один выбранный сервис, для которого не отключён бэкап.
    output: Финальные remote-файлы бэкапов и обновлённое состояние ротации.
    steps:
      - id: backup-acquire-lock
        body_markdown: |
          Команда `db backup [name]` начинает с защиты от параллельного запуска:
          - ставит lock, чтобы одновременно работал только один процесс бэкапа
          - открывает одно SSH/SFTP-соединение через `paramiko`, используя настройки из [[global-env]]
          - определяет кандидатов из всех [[service-env-file]] или из одного явно указанного сервиса
          - пропускает сервисы, у которых автобэкап выключен

          Если remote-сервер недоступен, команда пишет ошибку в терминал и лог-файл и сразу останавливается.
        links:
          - to: backup-stream-services
            condition: соединение открыто и список сервисов определён

      - id: backup-stream-services
        body_markdown: |
          Для каждого выбранного сервиса команда:
          - находит запущенный контейнер
          - запускает `pg_dump` внутри контейнера
          - при сжатом формате пропускает поток через `gzip`, при plain-формате пишет `.sql` напрямую
          - отправляет поток в [[remote-backup-storage]] как временный `.tmp` файл

          Обработка ошибок жёсткая:
          - если `pg_dump` возвращает ненулевой exit code, `.tmp` удаляется и процесс останавливается
          - если SFTP-соединение рвётся во время передачи, процесс останавливается и не переходит к следующему сервису
        links:
          - to: backup-rotate-and-report
            condition: все выбранные сервисы обработаны без критической ошибки

      - id: backup-rotate-and-report
        body_markdown: |
          После успешной передачи команда:
          - переименовывает `.tmp` в финальный файл в [[remote-backup-storage]]
          - запускает [[backup-rotation]] через то же SFTP-соединение
          - выводит статистику: сколько сервисов обработано, сколько завершилось успешно, были ли ошибки
        links:
          - to: restore-choose-backup
            condition: теперь нужно восстановиться из сохранённой копии
          - to: autobackup-choose-action
            condition: нужно закрепить регулярный запуск через cron
          - to: entry-assess-stack-state
            condition: бэкап завершён и можно выбрать следующее действие

  - id: local-dump
    purpose: Сделать локальный дамп одного сервиса и оставить файл на диске.
    input: Имя сервиса, для которого нужен локальный файл дампа.
    output: Локальный `.sql.gz` или `.sql` файл в каталоге `dumps/`.
    steps:
      - id: dump-find-container
        body_markdown: |
          Команда `db dump <name>` сначала ищет запущенный контейнер сервиса.

          Если контейнер не найден или не запущен, ручной дамп невозможен и команда останавливается.
        links:
          - to: dump-check-disk-space
            condition: контейнер найден и готов отдавать дамп

      - id: dump-check-disk-space
        body_markdown: |
          Перед записью локального файла команда оценивает свободное место:
          - запрашивает [`pg_database_size()`](https://www.postgresql.org/docs/current/functions-admin.html)
          - умножает размер на `0.3`, если дамп будет сжат через `gzip`
          - умножает размер на `1.0`, если нужен plain-формат
          - при нехватке места показывает, сколько нужно и сколько доступно, затем останавливается
        links:
          - to: dump-write-local-dump
            condition: свободного места достаточно

      - id: dump-write-local-dump
        body_markdown: |
          После проверки пространства команда:
          - стримит дамп в [[local-dumps]]
          - использует имя `<service>_YYYY-MM-DD_HH-MM.sql.gz` или `.sql`
          - оставляет файл только локально
          - сообщает путь к файлу и его итоговый размер
        links:
          - to: restore-choose-backup
            condition: этот локальный файл потом нужно использовать для восстановления
          - to: entry-assess-stack-state
            condition: дамп готов и можно продолжать работу

  - id: restore-service
    purpose: Заменить текущее содержимое базы данными из выбранного бэкапа.
    input: Имя сервиса и локальный или remote-файл дампа.
    output: Пересозданная база сервиса, заполненная данными из выбранной копии.
    steps:
      - id: restore-choose-backup
        body_markdown: |
          Команда `db restore <name> [path]` сначала выбирает источник данных.

          Если `path` не передан:
          - показывает локальные файлы из [[local-dumps]] с датами и размерами
          - подключается к [[remote-backup-storage]] через `paramiko` и получает список remote-файлов
          - собирает единый нумерованный список
          - ждёт, пока оператор выберет номер
          - скачивает выбранный remote-файл во временную папку

          Если `path` передан:
          - использует указанный локальный файл напрямую

          Поддерживаются только `.sql` и `.sql.gz`, формат определяется по расширению.
        links:
          - to: restore-confirm-replacement
            condition: файл бэкапа выбран и готов к применению

      - id: restore-confirm-replacement
        body_markdown: |
          Перед разрушительным восстановлением команда:
          - проверяет, что контейнер сервиса запущен
          - если контейнер не запущен, сообщает об этом, предлагает сначала поднять сервис и завершает работу
          - показывает предупреждение с именем сервиса, текущим размером базы и выбранным файлом бэкапа
          - запрашивает подтверждение, если не передан `--force`
        links:
          - to: restore-reload-database
            condition: оператор подтвердил замену данных

      - id: restore-reload-database
        body_markdown: |
          После подтверждения команда выполняет восстановление:
          - завершает активные подключения к базе
          - удаляет базу и создаёт её заново
          - загружает дамп через `psql`
          - если файл сжат, распаковывает его через `gzip` на лету
          - если файл был скачан с remote, удаляет временную копию после завершения
        links:
          - to: backup-acquire-lock
            condition: после восстановления нужен новый remote-бэкап
          - to: sizes-collect
            condition: нужно проверить итоговый размер базы
          - to: entry-assess-stack-state
            condition: восстановление завершено и можно выбрать следующую задачу

  - id: automation-control
    purpose: Управлять cron-задачами для автобэкапов и фонового сбора метрик.
    input: Подкоманда `install`, `uninstall`, `status`, `test` или `logs`.
    output: Актуальное cron-состояние, тестовый запуск бэкапа или просмотр логов.
    steps:
      - id: autobackup-choose-action
        body_markdown: |
          Семейство команд `db autobackup install|uninstall|status|test|logs` читает:
          - расписание, формат и таймаут бэкапов из [[global-env]]
          - флаг включения метрик и интервал их сбора из [[global-env]]
          - сервисные флаги отключения бэкапа из [[service-env-file]]

          Дальше flow расходится по типу действия.
        links:
          - to: autobackup-manage-cron-state
            condition: выбран install, uninstall или status
          - to: autobackup-run-test-or-read-logs
            condition: выбран test или logs

      - id: autobackup-manage-cron-state
        body_markdown: |
          Для управления cron команда делает следующее:
          - `install` создаёт cron-задачу бэкапов по расписанию из [[global-env]]
          - если метрики включены, `install` также создаёт cron для записи данных в [[metrics-db]]
          - `uninstall` удаляет и задачу бэкапов, и задачу метрик
          - `status` показывает настройки из [[global-env]], наличие cron-задач и флаги бэкапа по сервисам
        links:
          - to: backup-acquire-lock
            condition: после настройки или проверки нужно тут же вручную проверить бэкап
          - to: entry-assess-stack-state
            condition: cron-состояние проверено и можно перейти к другой задаче

      - id: autobackup-run-test-or-read-logs
        body_markdown: |
          Эта ветка даёт быстрый операционный контроль:
          - `test` запускает тот же flow, что и `db backup`, прямо сейчас
          - `logs` показывает хвост лог-файла бэкапов
          - фоновые метрики продолжают писаться в [[metrics-db]] только для запущенных контейнеров
        links:
          - to: backup-acquire-lock
            condition: выбран test
          - to: entry-assess-stack-state
            condition: просмотр логов завершён или следующее действие выбирается вручную

  - id: remove-service
    purpose: Удалить сервис из стека вместе с контейнером и локальными данными.
    input: Имя сервиса и, при необходимости, флаг `--force`.
    output: Сервис удалён из конфигов и локального окружения, а compose пересобран без него.
    steps:
      - id: remove-check-service
        body_markdown: |
          Команда `db remove <name> [--force]` сначала проверяет, что сервис существует.

          Если `.env.<name>` не найден:
          - показывает список существующих сервисов
          - завершает работу без изменений

          Если сервис найден, команда заранее показывает:
          - конфиг, который будет удалён
          - контейнер и его статус
          - каталог данных и его размер
        links:
          - to: remove-confirm-removal
            condition: сервис найден и состав удаления показан оператору

      - id: remove-confirm-removal
        body_markdown: |
          Без `--force` оператор проходит тройное подтверждение:
          - подтверждает удаление через `y/n`
          - повторно вводит точное имя сервиса
          - вводит слово `DELETE`, подтверждая удаление данных

          Это защищает разрушительную операцию, после которой локальные данные будут потеряны.
        links:
          - to: remove-delete-assets
            condition: подтверждение получено или передан флаг force

      - id: remove-delete-assets
        body_markdown: |
          После подтверждения команда:
          - останавливает и удаляет контейнер, если он существует
          - удаляет [[service-env-file]]
          - удаляет [[service-data-dir]]
          - перегенерирует [[generated-compose]]

          Remote-бэкапы не трогаются: они могут оставаться единственной копией данных.
        links:
          - to: entry-assess-stack-state
            condition: удаление завершено и можно продолжать работу с оставшимся стеком
          - to: sync-prepare-state
            condition: нужно дополнительно проверить итоговое состояние остальных сервисов
