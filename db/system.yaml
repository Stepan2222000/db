purpose: |
  Система задаёт operational-каркас для стека независимых PostgreSQL контейнеров. Оператор добавляет новые базы как отдельные сервисы, а затем управляет их параметрами, жизненным циклом, резервным копированием и восстановлением через набор shell-команд. Источником истины служат декларативные файлы проекта: `compose.yaml` хранит список сервисов, `.env.<service>` задают параметры каждой базы, а главный `.env` содержит общие настройки стека и backup-инфраструктуры.

definitions:
  - id: service-inventory
    body_markdown: |
      `compose.yaml` хранит декларативный список PostgreSQL сервисов. Для каждого сервиса фиксируются:
      - логическое имя сервиса в compose
      - `container_name`
      - `env_file` вида `.env.<service>`
      - host port для подключения снаружи
      - отдельный volume с данными
      - `restart: unless-stopped`
      - health check через `pg_isready -U admin`

      Проект может стартовать с пустым разделом `services`. Новые блоки должны появляться через `ops/add_service.sh`, чтобы `compose.yaml`, главный `.env` и каталоги данных пополнялись синхронно.

      Типовой сервис монтирует `./data/<service>` в каталог PostgreSQL внутри контейнера. Точный путь volume зависит от того, как сервис будет создан или скорректирован оператором.

      Скрипты считают `compose.yaml` и `.env.<service>` обязательным источником истины для backup, restore и изменения сервисов.

  - id: service-env-contract
    body_markdown: |
      Каждый `.env.<service>` файл должен задавать как минимум:
      - `POSTGRES_USER`
      - `POSTGRES_PASSWORD`
      - `POSTGRES_DB`
      - `POSTGRES_PORT`
      - `CONTAINER_NAME`

      Эти значения используются для трёх задач:
      - разрешить логическое имя сервиса в реальную базу, пользователя и контейнер
      - обновлять `compose.yaml` и главный `.env` при изменении сервиса
      - находить target для backup, restore и внешнего импорта

      В тех же файлах могут лежать персональные override-настройки `BACKUP_*`. Если значение не задано, используется [[global-stack-settings]].

      Скрипты discover-ят сервисы через glob `".env.*"`. Поэтому сервис, описанный только в `compose.yaml`, может существовать как контейнер, но остаться вне управляемого контура backup и restore.

  - id: global-stack-settings
    body_markdown: |
      Главный `.env` хранит глобальные operational-настройки стека:
      - расписание автобэкапов `BACKUP_SCHEDULE`
      - staging path для локальных бэкапов `BACKUP_DIR`
      - путь к log-файлу `BACKUP_LOG_FILE`
      - формат бэкапа `BACKUP_COMPRESSION`: `gzip` (`.sql.gz`) или `sql` (`.sql`)
      - режим `BACKUP_RUNNING_ONLY`
      - timeout операций `BACKUP_TIMEOUT` (по умолчанию `3600`)
      - включение orphan-cleanup `CLEANUP_ORPHANS_ENABLED` (по умолчанию `true`)
      - удалённый storage `BACKUP_STORAGE_SERVER` и `BACKUP_STORAGE_PATH`
      - GFS-ротацию `BACKUP_DAILY_KEEP`, `BACKUP_WEEKLY_KEEP`, `BACKUP_MONTHLY_KEEP`

      Этот же файл содержит registry из переменных `*_CONTAINER_NAME`. Он используется не только как справочник, но и как дополнительный источник "законных" контейнеров для [[orphan-container-rules]].

  - id: service-change-coordinator
    body_markdown: |
      Управление сервисом строится как координация файловой конфигурации, Docker-состояния и SQL-состояния внутри контейнера.

      При добавлении нового сервиса система:
      - проверяет имя и порт
      - ищет первый свободный порт по `.env.*` и `compose.yaml`
      - создаёт `.env.<service>`
      - добавляет сервисный блок в `compose.yaml`
      - дописывает mapping в главный `.env`
      - создаёт каталоги `data/<service>` и `db_backups/<service>`

      При изменении зарегистрированного сервиса система:
      - читает текущее состояние из `.env.<service>`, `compose.yaml` и живого контейнера
      - решает, нужен ли перезапуск контейнера
      - при опасных изменениях создаёт страхующий бэкап
      - обновляет env-значения, сервисный блок compose и глобальный registry
      - при переименовании сервиса переносит env-файл, каталоги данных и каталог бэкапов
      - внутри работающего PostgreSQL меняет пароль, создаёт нового пользователя, блокирует новые подключения, завершает существующие сессии, переименовывает базу и передаёт владельца

      При удалении сервиса система:
      - собирает размер данных и наличие бэкапов
      - показывает статус контейнера и активные подключения
      - требует подтверждения, а при удалении с данными делает несколько ступеней защиты
      - удаляет контейнер, env-файл, compose-блок, запись из главного `.env`, каталог данных и опционально каталог бэкапов

      Упрощённый сценарий смены пароля вынесен в отдельную команду, но использует тот же принцип: сначала обновить декларативную конфигурацию, затем синхронизировать живой контейнер.

  - id: backup-policy
    body_markdown: |
      `ops/backup/backup_pg.sh` выполняет пакетный backup по правилам:
      - допускает только один параллельный запуск через lock-файл `/tmp/backup_pg.lock`
      - перед стартом проверяет свободное место в staging-директории
      - требует доступный SSH к storage-серверу
      - при включённой auto-cleanup сначала удаляет контейнеры-призраки
      - discover-ит сервисы по `.env.*`, а не по `compose.yaml`
      - может работать по всему стеку или только по одному сервису
      - уважает персональные `BACKUP_*` override из [[service-env-contract]]
      - получает дамп через `pg_dump`, пишет реальный stderr в отдельный файл, сжимает dump при `gzip`
      - создаёт каталог сервиса на storage и передаёт артефакт через `scp`
      - при успешной доставке применяет GFS-ротацию: все свежие daily, затем weekly-воскресенья, затем monthly-копии первого числа
      - при неуспешной доставке сохраняет локальный файл для ручного восстановления
      - в конце пишет статистику и укорачивает log, если он вырос выше лимита

  - id: restore-source-resolution
    body_markdown: |
      Восстановление и внешний импорт сначала разрешают target в живой сервис. Поиск идёт по нескольким идентификаторам:
      - логическое имя сервиса
      - объявленное `CONTAINER_NAME`
      - реально работающий контейнер
      - имя базы из `POSTGRES_DB`

      После выбора target источник данных определяется так:
      - для managed restore можно передать явный путь к `.sql.gz` или `.sql`
      - если путь не указан, можно оставить marker-файл `SELECTED` в каталоге бэкапов сервиса
      - если marker нет, берётся самый свежий `.sql.gz` или `.sql` с префиксом целевой БД
      - если и такого файла нет, берётся любой самый свежий `.sql.gz` или `.sql` внутри каталога сервиса
      - для внешнего импорта принимаются `.sql` и `.sql.gz`

      Внешний импорт умеет сначала сделать страхующий backup текущего содержимого и только затем полностью заменить данные.

  - id: orphan-container-rules
    body_markdown: |
      Контейнер считается законным, если его имя найдено во всех трёх источниках одновременно:
      - `container_name` в `compose.yaml`
      - переменная `*_CONTAINER_NAME` в главном `.env`
      - `CONTAINER_NAME` в `.env.<service>`

      Скрипт cleanup рассматривает только контейнеры на образах PostgreSQL. Любой PostgreSQL-контейнер вне законного списка считается призраком.

      Cleanup может работать в трёх режимах:
      - показать найденных призраков
      - dry-run без удаления
      - остановить и удалить найденные призраки

      Проверка призраков вызывается не только вручную, но и автоматически: после добавления, изменения и удаления сервиса, а также перед backup-run.

  - id: operator-entrypoints
    body_markdown: |
      Основные operator-команды:
      - `bash ops/add_service.sh <service> [port] [password]`
      - `bash ops/update_service.sh <service>`
      - `bash ops/remove_service.sh <service> [--force]`
      - `bash ops/change_password.sh <service> <new_password>`
      - `bash ops/cleanup_orphans.sh [show|--dry-run|--kill]`
      - `bash ops/backup/backup_pg.sh [service]`
      - `bash ops/backup/manage_autobackup.sh [install|uninstall|status|test|logs]`
      - `bash ops/backup/restore.sh <project|container|dbname> [backup.sql.gz] [-y]`
      - `bash ops/import_external_dump.sh <service> <dump_file> [-y] [--backup]`

      Эти команды образуют пользовательский интерфейс системы. Runtime-flow ниже описывает не синтаксис shell, а последствия вызова этих entry points.

modules:
  - id: service-topology-management
    purpose: Синхронизировать каталог PostgreSQL сервисов с файлами проекта, контейнерами и SQL-состоянием внутри контейнеров.
    steps:
      - id: select-admin-action
        body_markdown: |
          Оператор выбирает lifecycle-действие через [[operator-entrypoints]]. На входе всегда есть ссылка на [[service-inventory]] и ожидание, что изменения должны попасть и в декларативные файлы, и в живой runtime.
        links:
          - to: prepare-new-service-definition
            condition: оператор вызвал `add_service.sh`
          - to: inspect-existing-service
            condition: оператор вызвал `update_service.sh`, `remove_service.sh` или `change_password.sh`
          - to: detect-orphan-containers
            condition: оператор вызвал `cleanup_orphans.sh`

      - id: prepare-new-service-definition
        body_markdown: |
          Система валидирует имя сервиса, резервирует свободный host port, создаёт `.env.<service>` по [[service-env-contract]], дописывает новый блок в `compose.yaml`, регистрирует контейнер в [[global-stack-settings]] и создаёт каталоги данных и бэкапов.
        links:
          - to: reconcile-service-runtime
            condition: "`.env.<service>`, `compose.yaml` и главный `.env` заполнены, каталоги созданы"

      - id: inspect-existing-service
        body_markdown: |
          Для зарегистрированного сервиса система читает `.env.<service>`, проверяет compose-блок, узнаёт статус контейнера и, если контейнер запущен, может посмотреть активные подключения. Дальше сценарий идёт по [[service-change-coordinator]]: безопасное изменение, переименование, удаление или упрощённая смена пароля.
        links:
          - to: apply-service-definition-change
            condition: оператор меняет параметры, переименовывает сервис или обновляет пароль
          - to: remove-service-assets
            condition: оператор подтвердил удаление сервиса

      - id: apply-service-definition-change
        body_markdown: |
          Система обновляет env-значения, compose-конфигурацию и глобальный registry. Если меняются имя сервиса, имя базы, пользователь, пароль, контейнер или порт, coordinator из [[service-change-coordinator]] переносит связанные файлы и каталоги, а при доступном контейнере синхронизирует SQL-состояние внутри PostgreSQL.
        links:
          - to: start-backup-run
            condition: изменение затрагивает данные (переименование БД, смена пользователя) — сначала страховочный бэкап
          - to: reconcile-service-runtime
            condition: файлы обновлены, можно перезапускать контейнер

      - id: remove-service-assets
        body_markdown: |
          Система останавливает и удаляет контейнер, вырезает сервис из `compose.yaml`, удаляет `.env.<service>`, убирает mapping из главного `.env`, удаляет каталог данных и по выбору оператора удаляет каталог бэкапов. После этого сервис исчезает из управляемого каталога.
        links:
          - to: detect-orphan-containers
            condition: сервис удалён — запуск cleanup для проверки остаточных контейнеров

      - id: reconcile-service-runtime
        body_markdown: |
          После добавления или изменения система поднимает либо перезапускает целевой сервис, если изменились Docker-значимые параметры. Затем она ждёт `pg_isready` и переводит сервис либо в состояние готовности, либо в состояние инициализации.
        links:
          - to: service-ready
            condition: "`pg_isready` вернул OK"
          - to: service-initializing
            condition: "`pg_isready` ещё не отвечает"

      - id: service-initializing
        body_markdown: |
          Сервис уже существует как контейнер, но ещё не прошёл health check. Система ожидает готовности `pg_isready` с таймаутом 1 час, периодически логируя статус (номер попытки, прошедшее время). При успехе — переход к готовности. При таймауте — завершение с ошибкой, контейнер остаётся для диагностики.
        links:
          - to: service-ready
            condition: "`pg_isready` стал успешным в пределах таймаута"
          - to: service-startup-failed
            condition: таймаут 1 час истёк, `pg_isready` так и не ответил

      - id: service-startup-failed
        body_markdown: |
          Система логирует ошибку и завершает операцию. Контейнер остаётся запущенным для ручной диагностики оператором.

      - id: service-ready
        body_markdown: |
          Сервис из [[service-inventory]] доступен на своём host port, использует собственный каталог данных и может участвовать в backup, restore и внешнем импорте.
        links:
          - to: select-admin-action
            condition: оператор запускает следующую lifecycle-команду
          - to: start-backup-run
            condition: наступило расписание cron или оператор вызвал `backup_pg.sh`
          - to: identify-replacement-target
            condition: оператор вызвал `restore.sh` или `import_external_dump.sh`

      - id: detect-orphan-containers
        body_markdown: |
          Система сравнивает живые PostgreSQL контейнеры с [[orphan-container-rules]]. В режиме просмотра она просто показывает лишние контейнеры, а в режиме очистки останавливает и удаляет их.
        links:
          - to: select-admin-action
            condition: cleanup завершён, оператор может продолжить работу со стеком

  - id: backup-execution
    purpose: Создать резервные копии управляемых PostgreSQL сервисов, доставить их на storage и удерживать историю по правилам GFS.
    steps:
      - id: start-backup-run
        body_markdown: |
          Backup запускается либо вручную через [[operator-entrypoints]], либо по cron-задаче, установленной из `manage_autobackup.sh`. Запуск может охватывать весь стек или один выбранный сервис.
        links:
          - to: validate-backup-prerequisites
            condition: процесс backup запущен

      - id: validate-backup-prerequisites
        body_markdown: |
          Система захватывает эксклюзивный lock, читает [[global-stack-settings]] и override из [[service-env-contract]], создаёт staging-директорию, проверяет свободное место, проверяет доступность storage по SSH и при необходимости заранее запускает cleanup по [[orphan-container-rules]].
        links:
          - to: select-backup-targets
            condition: lock захвачен, место есть, storage доступен
          - to: backup-aborted
            condition: lock занят другим процессом, недостаточно места или storage недоступен по SSH

      - id: backup-aborted
        body_markdown: |
          Система логирует причину отказа (занятый lock, нехватка места, недоступный storage) и завершает backup без обработки сервисов. Lock освобождается, если был захвачен.

      - id: select-backup-targets
        body_markdown: |
          Система проходит по `.env.*` файлам, фильтрует сервисы по имени, если был задан целевой сервис, пропускает сервисы с `BACKUP_ENABLED=false` и пытается разрешить для каждого декларативного сервиса реальный контейнер. Сервис без разрешимого контейнера считается неуспешным backup-элементом, но не останавливает пакетный запуск.
        links:
          - to: dump-service-database
            condition: контейнер сервиса найден и запущен
          - to: record-backup-failure
            condition: контейнер сервиса не найден или не запущен
          - to: finish-backup-run
            condition: все сервисы обработаны

      - id: dump-service-database
        body_markdown: |
          Для выбранного сервиса система делает `pg_dump` внутри контейнера с timeout и, если нужно, с переданным паролем. STDERR не скрывается: он сохраняется в отдельный файл и затем попадает в лог. Слишком маленький дамп помечается предупреждением.
        links:
          - to: stage-backup-artifact
            condition: "`pg_dump` завершился успешно, дамп получен"
          - to: record-backup-failure
            condition: "`pg_dump` завершился ошибкой или превысил timeout"

      - id: stage-backup-artifact
        body_markdown: |
          Система подготавливает локальный артефакт: при `gzip` сжимает dump, подбирает имя файла по имени базы и timestamp, создаёт каталог сервиса на storage и готовит файл к передаче.
        links:
          - to: publish-backup-artifact
            condition: файл сжат (или оставлен как `.sql`), имя сформировано

      - id: publish-backup-artifact
        body_markdown: |
          Артефакт передаётся на storage через `scp`. Успешная доставка удаляет локальную staging-копию. Неудачная доставка оставляет локальный файл на диске, чтобы оператор мог забрать его вручную.
        links:
          - to: rotate-remote-history
            condition: "`scp` завершился успешно, локальная копия удалена"
          - to: record-backup-failure
            condition: "`scp` не удался, локальная копия сохранена"

      - id: rotate-remote-history
        body_markdown: |
          После успешной публикации система применяет [[backup-policy]] на удалённой стороне: хранит все недавние daily-копии, оставляет weekly-копии только по воскресеньям, monthly-копии только за первое число месяца и повторяет попытку ротации перед тем, как признать её неуспешной.
        links:
          - to: select-backup-targets
            condition: переход к следующему сервису в очереди
          - to: finish-backup-run
            condition: это был последний сервис

      - id: record-backup-failure
        body_markdown: |
          Система пишет в лог реальную ошибку PostgreSQL или передачи, удаляет временные повреждённые файлы, увеличивает счётчик ошибок и переходит к следующему сервису, не сваливая весь batch run.
        links:
          - to: select-backup-targets
            condition: переход к следующему сервису в очереди
          - to: finish-backup-run
            condition: это был последний сервис

      - id: finish-backup-run
        body_markdown: |
          В конце batch run система записывает итоговую статистику, при необходимости укорачивает log-файл и освобождает lock. Если backup запускался как страховка перед другой операцией, дальше можно продолжить ожидавший flow.
        links:
          - to: service-ready
            condition: плановый backup завершён, стек продолжает работу
          - to: apply-service-definition-change
            condition: это был страховочный backup перед изменением сервиса
          - to: confirm-database-replacement
            condition: это был страховочный backup перед импортом данных

  - id: database-content-replacement
    purpose: Полностью заменить содержимое работающей базы данными из управляемого бэкапа или внешнего SQL-дампа.
    steps:
      - id: identify-replacement-target
        body_markdown: |
          Оператор запускает restore или внешний import через [[operator-entrypoints]]. Система по [[restore-source-resolution]] сопоставляет указанный ключ с логическим сервисом, контейнером или именем БД и требует, чтобы target-контейнер реально был запущен.
        links:
          - to: choose-replacement-source
            condition: target-сервис найден и контейнер запущен
          - to: replacement-failed
            condition: сервис не найден, контейнер не запущен или ключ не разрешился

      - id: choose-replacement-source
        body_markdown: |
          Система выбирает источник данных: явный backup-файл, marker `SELECTED`, последний управляемый `.sql.gz` или `.sql` для сервиса, или внешний `.sql` / `.sql.gz` файл. Для внешнего импорта оператор может запросить страховочный backup текущего содержимого.
        links:
          - to: start-backup-run
            condition: оператор запросил `--backup` перед импортом
          - to: confirm-database-replacement
            condition: файл-источник найден и выбран
          - to: replacement-failed
            condition: ни явный файл, ни marker, ни автоматический поиск не дали результата

      - id: confirm-database-replacement
        body_markdown: |
          Если не указан `-y`, система явно предупреждает, что целевая база будет удалена целиком и заменена содержимым выбранного источника. Отмена на этом шаге оставляет данные нетронутыми.
        links:
          - to: recreate-empty-database
            condition: оператор подтвердил замену
          - to: replacement-cancelled
            condition: оператор отказался от замены

      - id: replacement-cancelled
        body_markdown: |
          Оператор отменил операцию. Данные в базе не затронуты, система возвращается к обычной работе.
        links:
          - to: service-ready
            condition: сервис продолжает работу с прежними данными

      - id: recreate-empty-database
        body_markdown: |
          Система ждёт `pg_isready`, завершает все активные подключения к target-базе, выполняет `DROP DATABASE` и затем создаёт чистую базу с тем же логическим именем.
        links:
          - to: load-replacement-data
            condition: "`DROP DATABASE` и `CREATE DATABASE` выполнены успешно"
          - to: replacement-failed
            condition: не удалось удалить или создать базу (активные подключения, ошибка PostgreSQL)

      - id: load-replacement-data
        body_markdown: |
          Данные потоком подаются в `psql`. Managed restore и внешний import принимают оба формата (`.sql.gz` и `.sql`), а пароль при необходимости прокидывается в окружение контейнера.
        links:
          - to: verify-replacement-result
            condition: "`psql` завершился без ошибки"
          - to: replacement-failed
            condition: "`psql` вернул ошибку при загрузке данных"

      - id: verify-replacement-result
        body_markdown: |
          После managed restore система сообщает об успешной замене. После внешнего импорта она дополнительно считает число таблиц, измеряет размер базы и пишет подробный log в `ops/backup/import.log`.
        links:
          - to: service-ready
            condition: верификация пройдена, база готова к работе

      - id: replacement-failed
        body_markdown: |
          Система логирует причину ошибки и завершает операцию. Состояние базы зависит от шага, на котором произошёл сбой: если до `DROP DATABASE` — данные не затронуты, если после — база может быть пустой или повреждённой, требуется ручное восстановление.
        links:
          - to: service-ready
            condition: контейнер остаётся запущенным, оператор разбирается вручную
